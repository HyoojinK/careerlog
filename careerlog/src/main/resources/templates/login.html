<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<th:block th:replace="~{common/head :: head}"></th:block>
	<title>Login</title>

	<script src="/js/login.js"></script>
	<link rel="stylesheet" href="/css/login.css">
	
</head>
<body>
	<form id="loginForm" action="/loginCheck" method="post">
		<div>
			<label>아이디</label>
			<input type="text" id="idValue"/>
			<label>비밀번호</label>
			<input type="password" id="pwValue"/>
		</div>
	</form>
	<button type="button" id="loginCheck">로그인</button>
	<button type="button" id="btnJoin">회원가입</button>
	<div th:if="${msg != null}" th:text="${msg}" class="result_msg"></div>
	
</body>
</html>
