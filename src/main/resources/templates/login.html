<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<title>CareerLog Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/login.css}">

<script th:src="@{/js/common/common.js}"></script>
<script th:src="@{/js/login.js}"></script>
</head>
<body>
	<div class="login_page">
		<div class="login_box">
			<div class="logo_wrap">
				<img th:src="@{/images/logo.png}" alt="CareerLog">
			</div>

			<div class="login_title">로그인</div>

			<form id="loginForm" action="/loginCheck" method="post">
				<div class="input_wrap">
					<label for="idValue">아이디</label> <input type="text" id="idValue" name="userId" placeholder="아이디를 입력해주세요." autocomplete="off">
				</div>

				<div class="input_wrap">
					<label for="pwValue">비밀번호</label> <input type="password" id="pwValue" name="password" placeholder="비밀번호를 입력해주세요.">
				</div>

				<div th:if="${msg != null}" th:text="${msg}" class="result_msg"></div>

				<div class="btn_wrap">
					<button type="button" id="loginCheck" class="login_btn">로그인</button>
					<button type="button" id="btnJoin" class="join_btn">회원가입</button>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
