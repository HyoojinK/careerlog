<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>CareerLog | 대시보드</title>
	<th:block th:replace="~{common/head :: head}"></th:block>
	<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
	<div class="page_wrap">
		<th:block th:replace="~{common/layout :: commonLayout}"></th:block>
		
		<div class="content_wrap">
			<div class="content_inner">
				<div class="dashboard_greeting">
					<p class="greeting_title">안녕하세요, 김효진 님! 👋</p>
					<p class="greeting_desc">오늘도 취업 준비 화이팅입니다.</p>
				</div>
				
				<div class="dashboard_card_list">
					<div class="dashboard_card apply_card">
						<div class="card_icon_box"></div>
						<div class="card_content">
							<p class="card_label">총 지원 회사</p>
							<p class="card_count">15</p>
							<p class="card_desc">전체 지원한 회사 수</p>
						</div>
					</div>
			
					<div class="dashboard_card interview_card">
						<div class="card_icon_box"></div>
						<div class="card_content">
							<p class="card_label">면접 예정</p>
							<p class="card_count">3</p>
							<p class="card_desc">다가오는 면접 일정</p>
						</div>
					</div>
			
					<div class="dashboard_card pass_card">
						<div class="card_icon_box"></div>
						<div class="card_content">
							<p class="card_label">최종합격</p>
							<p class="card_count">1</p>
							<p class="card_desc">합격을 축하합니다! 🎉</p>
						</div>
					</div>
			
					<div class="dashboard_card fail_card">
						<div class="card_icon_box"></div>
						<div class="card_content">
							<p class="card_label">불합격</p>
							<p class="card_count">7</p>
							<p class="card_desc">더 좋은 기회가 있어요!</p>
						</div>
					</div>
				</div>
				
				<div class="dashboard_panel_wrap">
					<div class="dashboard_panel"></div>
					<div class="dashboard_panel"></div>
					<div class="dashboard_panel"></div>
					<div class="dashboard_panel"></div>
				</div>
			</div>
<!-- 			https://korean-advice-open-api.vercel.app/api/advice -->
		</div>
	</div>
</body>
</html>
