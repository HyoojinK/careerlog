<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head">
	<meta charset="UTF-8">
</head>

<body>
	<div th:fragment="commonLayout">
		<div id="sideBar" class="side_bar_wrap">
			<div class="logo_wrap">
				<img th:src="@{/images/logo_white.png}"/>
			</div>
			<div class="menu_wrap">
				<ul>
					<li>
						<img th:src="@{/images/menu/icon_home.png}">
						<span>대시보드</span>
					</li>
					<li>
						<img th:src="@{/images/menu/icon_company.png}">
						<span>지원 회사 관리</span>
					</li>
					<li>
						<img th:src="@{/images/menu/icon_calendar.png}">
						<span>면접 일정 관리</span>
					</li>
					<li>
						<img th:src="@{/images/menu/icon_note.png}">
						<span>메모 / 회고</span>
					</li>
					<li>
						<img th:src="@{/images/menu/icon_chart.png}">
						<span>통계</span>
					</li>
				</ul>
			</div>
		</div>
		
		<div id="topBar" class="top_bar_wrap">
			<div class="alarm_wrap">
				<button type="button" class="alarm_btn">
					<span class="alarm_count">0</span>
				</button>
			</div>
			<div class="user_wrap">
				<div class="user_image"></div>
				<div class="user_name">김효진 님</div>
				<div class="user_info">
					<ul class="dis_none">
						<li>마이페이지</li>
						<li>로그아웃</li>
					</ul>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
